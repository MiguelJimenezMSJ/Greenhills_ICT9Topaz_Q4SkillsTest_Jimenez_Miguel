<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <title>Login Page</title>

    <style>
        body {
             background-image: url(https://img.freepik.com/free-vector/trendy-retro-synth-line-perspective-wallpaper-with-smoke-effect_1017-43048.jpg?semt=ais_hybrid&w=740&q=80);
            background-repeat: no-repeat;
            background-size: cover;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        nav.navbar {
            background-color: blue;
        }
        
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    
    <div class="p-5 rounded shadow text-center"
    style="width:50%; max-width:350px; background-color:#5c6cff;">
        
        <h2 class="mb-3" style="color:#000000;">🎮Log In</h2>
        <p class="mb-4">Please enter your account details</p>

        <label>Username</label><br><br>
        <input type="text" id="user" class="form-control mb-3" placeholder="Enter Username">
        <label>Password</label><br><br>
        <input type="password" id="pass" class="form-control mb-4" placeholder="Enter Password">
        

        <button onclick="log_in()" class="btn btn-primary w-100">
            Log In
        </button>
        
        <div id="errorMsg" class="mt-3 text-danger fw-bold"></div>

    </div>

</div>

<script src="main.js"></script>

</body>
</html>
